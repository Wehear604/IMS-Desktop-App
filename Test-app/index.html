<!doctype html>
<html>
  <body
    style="font-family: sans-serif; text-align: center; background: #f4f4f4"
  >
    <h2>Test App</h2>
    <p><strong>Version:</strong> <span id="ver"></span></p>
    <p><strong>Time:</strong> <span id="time"></span></p>

    <script>
      document.getElementById("ver").innerText =
        require("./package.json").version;
      setInterval(() => {
        document.getElementById("time").innerText =
          new Date().toLocaleTimeString();
      }, 1000);
    </script>
  </body>
</html>
